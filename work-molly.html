<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOLLY绘色游园会 · 作品详情</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500&display=swap');

  :root {
    --cream: #F5F0E8;
    --warm-white: #FAF8F4;
    --charcoal: #2C2C2A;
    --ink: #1A1917;
    --gold: #B8924A;
    --gold-light: #E8D5A3;
    --muted: #8A8680;
    --dust: #D4CFC5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--cream);
    font-family: 'Inter', 'Noto Serif SC', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* ─── CURSOR ─── */
  .cursor {
    width: 12px; height: 12px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, background 0.3s;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    width: 40px; height: 40px;
    border: 1px solid rgba(184,146,74,0.5);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.15s ease;
  }

  /* ─── NAV ─── */
  .nav-back {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 24px 40px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(20px); background: rgba(26,25,23,0.7);
    border-bottom: 1px solid rgba(212,207,197,0.08);
  }
  .nav-back a {
    color: var(--gold);
    text-decoration: none;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.85rem;
    display: flex; align-items: center; gap: 8px;
    transition: opacity 0.3s ease;
  }
  .nav-back a:hover { opacity: 0.7; }
  .nav-back .brand {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--gold-light);
    letter-spacing: 0.5px;
  }

  /* ─── HERO ─── */
  .hero {
    min-height: 45vh;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 120px 40px 48px;
    position: relative;
  }
  .hero-label {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero-title {
    font-family: 'Playfair Display', 'Noto Serif SC', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 400;
    line-height: 1.15;
    color: var(--warm-white);
    max-width: 800px;
  }
  .hero-title em {
    font-style: italic;
    color: var(--gold-light);
  }
  .hero-meta {
    display: flex; gap: 32px; margin-top: 28px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .hero-meta span { display: flex; align-items: center; gap: 8px; }
  .hero-meta .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--gold); display: inline-block;
  }

  /* ─── ACTIONS ─── */
  .actions {
    padding: 0 40px 40px;
    display: flex; gap: 16px;
  }
  .btn {
    padding: 12px 28px;
    border: 1px solid var(--gold);
    color: var(--gold);
    background: transparent;
    font-family: 'Inter', 'Noto Serif SC', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 0.4s ease;
  }
  .btn:hover {
    background: var(--gold);
    color: var(--ink);
  }
  .btn-primary {
    background: var(--gold);
    color: var(--ink);
  }
  .btn-primary:hover {
    background: var(--gold-light);
    border-color: var(--gold-light);
  }

  /* ─── SHOWCASE ─── */
  .showcase {
    padding: 0 40px 80px;
  }
  .showcase-img {
    width: 100%; max-width: 1200px; margin: 0 auto;
    display: block;
    border-radius: 4px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
  }

  /* ─── FOOTER ─── */
  .page-footer {
    padding: 40px;
    text-align: center;
    border-top: 1px solid rgba(212,207,197,0.08);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .page-footer a { color: var(--gold); text-decoration: none; }
  .page-footer a:hover { opacity: 0.7; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .nav-back { padding: 16px 20px; }
    .hero { padding: 100px 20px 32px; }
    .actions { padding: 0 20px 32px; flex-direction: column; }
    .showcase { padding: 0 20px 60px; }
    .btn { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- NAV -->
  <nav class="nav-back">
    <a href="index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      返回作品集
    </a>
    <span class="brand">顾杨彬 · 作品集</span>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-label">交互设计作品</div>
    <h1 class="hero-title">MOLLY绘色游园会<br><em>H5交互设计</em></h1>
    <div class="hero-meta">
      <span><span class="dot"></span>H5 移动端</span>
      <span><span class="dot"></span>2024</span>
      <span><span class="dot"></span>交互设计</span>
    </div>
  </section>

  <!-- ACTIONS -->
  <div class="actions">
    <a href="https://gillian33.github.io/molly/" target="_blank" class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      查看在线作品
    </a>
    <a href="index.html" class="btn">返回作品集</a>
  </div>

  <!-- SHOWCASE -->
  <section class="showcase">
    <img src="molly-showcase.png" alt="MOLLY绘色游园会展示" class="showcase-img">
  </section>

  <!-- FOOTER -->
  <footer class="page-footer">
    <p>顾杨彬 · 南京工业大学艺术与科技专业 · 主修交互设计</p>
    <p style="margin-top:8px;"><a href="index.html">返回作品集主页</a></p>
  </footer>

  <script>
    // ─── CUSTOM CURSOR ───
    const cursor = document.getElementById('cursor');
    const cursorRing = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', (e) => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
    });

    function animateRing() {
      rx += (mx - rx) * 0.15; ry += (my - ry) * 0.15;
      cursorRing.style.left = rx + 'px'; cursorRing.style.top = ry + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();
  </script>

</body>
</html>
